trigger:
- main

pool:
  name: java-agent



stages:
- stage: terraform_install
  displayName: terraform install
  jobs:
  - job: install
    displayName: terraform_install_job
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'
- stage: terraform_init
  displayName: teraform init
  jobs:
  - job: terraform_init
    displayName: terraform_init_job
    steps:
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'
        backendServiceArm: 'java-service-connection'
        backendAzureRmResourceGroupName: 'java_RG'
        backendAzureRmStorageAccountName: 'javastg'
        backendAzureRmContainerName: 'java-container'
        backendAzureRmKey: 'terraform state file'
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'custom'
        workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'
        outputTo: 'console'
        customCommand: 'fmt'
        environmentServiceNameAzureRM: 'java-service-connection'
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'
    - task: tfsec@1
      inputs:
        version: 'v1.26.0'
        workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'